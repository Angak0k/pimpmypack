basePath: /api
definitions:
  accounts.Account:
    properties:
      banner_position_y:
        type: integer
      created_at:
        type: string
      email:
        type: string
      firstname:
        type: string
      has_banner_image:
        type: boolean
      has_profile_image:
        type: boolean
      id:
        type: integer
      image_position_x:
        type: integer
      image_position_y:
        type: integer
      instagram_url:
        type: string
      is_profile_public:
        type: boolean
      lastname:
        type: string
      preferred_currency:
        type: string
      preferred_unit_system:
        type: string
      role:
        type: string
      status:
        type: string
      updated_at:
        type: string
      username:
        type: string
      youtube_url:
        type: string
    type: object
  accounts.AccountUpdateInput:
    properties:
      banner_position_y:
        type: integer
      email:
        type: string
      firstname:
        type: string
      image_position_x:
        type: integer
      image_position_y:
        type: integer
      instagram_url:
        type: string
      is_profile_public:
        type: boolean
      lastname:
        type: string
      preferred_currency:
        type: string
      preferred_unit_system:
        type: string
      youtube_url:
        type: string
    required:
    - email
    - firstname
    - lastname
    type: object
  accounts.ForgotPasswordInput:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  accounts.LoginInput:
    properties:
      password:
        type: string
      remember_me:
        description: optional, defaults to false
        type: boolean
      username:
        type: string
    required:
    - password
    - username
    type: object
  accounts.PasswordUpdateInput:
    properties:
      current_password:
        type: string
      new_password:
        type: string
    required:
    - current_password
    - new_password
    type: object
  accounts.RegisterInput:
    properties:
      email:
        type: string
      firstname:
        type: string
      lastname:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - email
    - firstname
    - lastname
    - password
    - username
    type: object
  accounts.ResendConfirmEmailInput:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  apitypes.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  apitypes.OkResponse:
    properties:
      message:
        type: string
    type: object
  inventories.Inventory:
    properties:
      category:
        type: string
      created_at:
        type: string
      currency:
        type: string
      description:
        type: string
      has_image:
        type: boolean
      id:
        type: integer
      item_name:
        type: string
      price:
        type: integer
      updated_at:
        type: string
      url:
        type: string
      user_id:
        type: integer
      weight:
        type: integer
    type: object
  inventories.InventoryCreateRequest:
    properties:
      category:
        type: string
      currency:
        type: string
      description:
        type: string
      item_name:
        type: string
      price:
        type: integer
      url:
        type: string
      weight:
        type: integer
    required:
    - category
    - item_name
    type: object
  inventories.InventoryUpdateRequest:
    properties:
      category:
        type: string
      currency:
        type: string
      description:
        type: string
      item_name:
        type: string
      price:
        type: integer
      url:
        type: string
      weight:
        type: integer
    required:
    - category
    - item_name
    type: object
  packs.ImportExternalPackResponse:
    properties:
      message:
        type: string
      pack_id:
        type: integer
    type: object
  packs.ImportFromURLRequest:
    properties:
      url:
        type: string
    required:
    - url
    type: object
  packs.Pack:
    properties:
      adventure:
        type: string
      created_at:
        type: string
      has_image:
        type: boolean
      id:
        type: integer
      is_favorite:
        type: boolean
      pack_description:
        type: string
      pack_items_count:
        type: integer
      pack_name:
        type: string
      pack_weight:
        type: integer
      season:
        type: string
      sharing_code:
        type: string
      trail:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  packs.PackContent:
    properties:
      consumable:
        type: boolean
      created_at:
        type: string
      id:
        type: integer
      item_id:
        type: integer
      pack_id:
        type: integer
      quantity:
        type: integer
      updated_at:
        type: string
      worn:
        type: boolean
    type: object
  packs.PackContentRequest:
    properties:
      consumable:
        type: boolean
      inventory_id:
        type: integer
      quantity:
        minimum: 1
        type: integer
      worn:
        type: boolean
    required:
    - inventory_id
    - quantity
    type: object
  packs.PackContentWithItem:
    properties:
      category:
        type: string
      consumable:
        type: boolean
      currency:
        type: string
      inventory_id:
        type: integer
      item_description:
        type: string
      item_name:
        type: string
      item_url:
        type: string
      pack_content_id:
        type: integer
      pack_id:
        type: integer
      price:
        type: integer
      quantity:
        type: integer
      weight:
        type: integer
      worn:
        type: boolean
    type: object
  packs.PackCreateRequest:
    properties:
      adventure:
        type: string
      pack_description:
        type: string
      pack_name:
        type: string
      season:
        type: string
      trail:
        type: string
    required:
    - pack_name
    type: object
  packs.PackOptionsResponse:
    properties:
      adventures:
        items:
          type: string
        type: array
      seasons:
        items:
          type: string
        type: array
      trails:
        items:
          type: string
        type: array
    type: object
  packs.PackUpdateRequest:
    properties:
      adventure:
        type: string
      pack_description:
        type: string
      pack_name:
        type: string
      season:
        type: string
      trail:
        type: string
    required:
    - pack_name
    type: object
  packs.SharedPackInfo:
    properties:
      adventure:
        type: string
      created_at:
        type: string
      has_image:
        type: boolean
      id:
        type: integer
      pack_description:
        type: string
      pack_name:
        type: string
      season:
        type: string
      trail:
        type: string
    type: object
  packs.SharedPackResponse:
    properties:
      contents:
        items:
          $ref: '#/definitions/packs.PackContentWithItem'
        type: array
      pack:
        $ref: '#/definitions/packs.SharedPackInfo'
    type: object
  profiles.PublicProfile:
    properties:
      banner_position_y:
        type: integer
      firstname:
        type: string
      has_banner_image:
        type: boolean
      has_profile_image:
        type: boolean
      image_position_x:
        type: integer
      image_position_y:
        type: integer
      instagram_url:
        type: string
      shared_packs:
        items:
          $ref: '#/definitions/profiles.SharedPackSummary'
        type: array
      username:
        type: string
      youtube_url:
        type: string
    type: object
  profiles.SharedPackSummary:
    properties:
      adventure:
        type: string
      created_at:
        type: string
      has_image:
        type: boolean
      id:
        type: integer
      pack_description:
        type: string
      pack_items_count:
        type: integer
      pack_name:
        type: string
      pack_weight:
        type: integer
      season:
        type: string
      sharing_code:
        type: string
      trail:
        type: string
    type: object
  security.RefreshResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
    type: object
  security.RefreshTokenInput:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  security.TokenPairResponse:
    properties:
      access_expires_in:
        type: integer
      access_token:
        type: string
      refresh_expires_in:
        type: integer
      refresh_token:
        type: string
      token:
        description: Backward compatibility - same as AccessToken
        type: string
    type: object
host: pmp-dev.alki.earth
info:
  contact: {}
  description: API server to manage Backpack Inventory and Packing Lists
  title: PimpMyPack API
  version: "1.0"
paths:
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchange a valid refresh token for a new access token
      parameters:
      - description: Refresh Token
        in: body
        name: refresh_token
        required: true
        schema:
          $ref: '#/definitions/security.RefreshTokenInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/security.RefreshResponse'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "401":
          description: Invalid or expired refresh token
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
      summary: Refresh access token
      tags:
      - Authentication
  /confirmemail:
    get:
      description: Confirm email address by providing username and email
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apitypes.OkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
      summary: Confirm email address
      tags:
      - Public
  /forgotpassword:
    post:
      consumes:
      - application/json
      description: Send a new password to the user's email
      parameters:
      - description: Email Address
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/accounts.ForgotPasswordInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apitypes.OkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
      summary: Reset password
      tags:
      - Public
  /login:
    post:
      consumes:
      - application/json
      description: |-
        Log in a user by providing username (or email) and password
        The username field accepts either a username or an email address
        Returns access token (short-lived) and refresh token (long-lived)
        Use remember_me to extend refresh token lifetime
      parameters:
      - description: Credentials Info
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/accounts.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful with access and refresh tokens
          schema:
            $ref: '#/definitions/security.TokenPairResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "401":
          description: Invalid credentials or account not confirmed
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
      summary: User login
      tags:
      - Public
  /register:
    post:
      consumes:
      - application/json
      description: Register a new user with username, password, email, firstname,
        and lastname
      parameters:
      - description: Register Informations
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/accounts.RegisterInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apitypes.OkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "409":
          description: Email already in use
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
      summary: Register new user
      tags:
      - Public
  /resend-confirmemail:
    post:
      consumes:
      - application/json
      description: Resend confirmation email to a pending user account. Always returns
        200 to prevent user enumeration.
      parameters:
      - description: Email Address
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/accounts.ResendConfirmEmailInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apitypes.OkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
      summary: Resend confirmation email
      tags:
      - Public
  /sharedlist/{sharing_code}:
    get:
      consumes:
      - application/json
      description: Retrieves pack metadata and contents using a sharing code
      parameters:
      - description: Pack sharing code
        in: path
        name: sharing_code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Shared pack with metadata and contents
          schema:
            $ref: '#/definitions/packs.SharedPackResponse'
        "404":
          description: Pack not found or not shared
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
      summary: Get shared pack with metadata
      tags:
      - Public
  /user/{username}:
    get:
      description: |-
        Returns public profile information and shared packs for a user.
        Returns 404 for non-existent users or users without a public profile (anti-enumeration).
      parameters:
      - description: Username
        in: path
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/profiles.PublicProfile'
        "404":
          description: Profile not found
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
      summary: Get public user profile
      tags:
      - Profiles
  /v1/accounts/{id}/banner:
    get:
      description: Get the banner/hero image for a user account
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - image/jpeg
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Invalid account ID
          schema:
            type: string
        "404":
          description: No banner image found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get banner image
      tags:
      - Account Images
  /v1/accounts/{id}/image:
    get:
      description: Get the profile image for a user account
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - image/jpeg
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Invalid account ID
          schema:
            type: string
        "404":
          description: No profile image found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get profile image
      tags:
      - Account Images
  /v1/importfromlighterpack:
    post:
      consumes:
      - multipart/form-data
      description: Import from lighterpack csv pack file
      parameters:
      - description: CSV file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: CSV data imported successfully with pack ID
          schema:
            $ref: '#/definitions/packs.ImportExternalPackResponse'
        "400":
          description: Invalid CSV format
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
      security:
      - Bearer: []
      summary: Import from lighterpack csv pack file
      tags:
      - Packs
  /v1/importfromlighterpackurl:
    post:
      consumes:
      - application/json
      description: Import items from a LighterPack sharing URL into a new pack
      parameters:
      - description: LighterPack URL
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/packs.ImportFromURLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/packs.ImportExternalPackResponse'
        "400":
          description: Invalid URL
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "422":
          description: Failed to parse page
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "502":
          description: Failed to fetch page
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
      security:
      - Bearer: []
      summary: Import a pack from a LighterPack sharing URL
      tags:
      - Packs
  /v1/importfrompimpmypackurl:
    post:
      consumes:
      - application/json
      description: Import items from a PimpMyPack sharing URL into a new pack
      parameters:
      - description: PimpMyPack URL
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/packs.ImportFromURLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/packs.ImportExternalPackResponse'
        "400":
          description: Invalid URL
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "404":
          description: Shared pack not found
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
      security:
      - Bearer: []
      summary: Import a pack from a PimpMyPack sharing URL
      tags:
      - Packs
  /v1/myaccount:
    get:
      description: Get information of the currently logged-in user
      produces:
      - application/json
      responses:
        "200":
          description: Account Information
          schema:
            $ref: '#/definitions/accounts.Account'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "404":
          description: Account not found
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
      security:
      - Bearer: []
      summary: Get account info
      tags:
      - Accounts
    put:
      consumes:
      - application/json
      description: Update information of the currently logged-in user (email, name,
        preferences only)
      parameters:
      - description: Account update data (excludes role, status, username)
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/accounts.AccountUpdateInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/accounts.Account'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
      security:
      - Bearer: []
      summary: Update account info
      tags:
      - Accounts
  /v1/myaccount/banner:
    delete:
      description: Delete the banner/hero image for the currently logged-in user
      produces:
      - application/json
      responses:
        "200":
          description: Banner image deleted successfully
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Delete banner image
      tags:
      - Account Images
    post:
      consumes:
      - multipart/form-data
      description: Upload or update the banner/hero image for the currently logged-in
        user
      parameters:
      - description: Image file (JPEG, PNG, or WebP, max 5MB)
        in: formData
        name: image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Banner image uploaded successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request or image
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "413":
          description: Payload too large
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Upload or update banner image
      tags:
      - Account Images
  /v1/myaccount/image:
    delete:
      description: Delete the profile image for the currently logged-in user
      produces:
      - application/json
      responses:
        "200":
          description: Image deleted successfully
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Delete profile image
      tags:
      - Account Images
    post:
      consumes:
      - multipart/form-data
      description: Upload or update the profile image for the currently logged-in
        user
      parameters:
      - description: Image file (JPEG, PNG, or WebP, max 5MB)
        in: formData
        name: image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Image uploaded successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request or image
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "413":
          description: Payload too large
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Upload or update profile image
      tags:
      - Account Images
  /v1/myinventory:
    get:
      description: Retrieves a list of all inventories of the user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/inventories.Inventory'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "404":
          description: No Inventory Found
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apitypes.ErrorResponse'
